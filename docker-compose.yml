name: iasa

services:
  postgres:
    image: postgres:16-alpine
    container_name: iasa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-iasa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iasa_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-iasa}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iasa} -d ${POSTGRES_DB:-iasa}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iasa-network

  redis:
    image: redis:7-alpine
    container_name: iasa-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-iasa_redis_dev}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-iasa_redis_dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iasa-network

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: development
    container_name: iasa-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${API_PORT:-4000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-iasa}:${POSTGRES_PASSWORD:-iasa_dev_password}@postgres:5432/${POSTGRES_DB:-iasa}
      REDIS_URL: redis://:${REDIS_PASSWORD:-iasa_redis_dev}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production-minimum-32-chars}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-change-refresh-secret-in-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change-encryption-key-32-chars-min}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-haiku-4-5-20251001}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      MAX_CONCURRENT_SCANS: ${MAX_CONCURRENT_SCANS:-3}
      REPORTS_DIR: /app/reports
      DOCKER_ENV: "true"
      # Better Auth — generate a strong secret: openssl rand -base64 32
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-iasa-dev-secret-change-in-production-min-32-chars!!}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:4000}
      # Google OAuth (optional — leave empty to disable the Google button)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      # Resend for invitation emails (optional — invite links appear in API logs when not set)
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-onboarding@resend.dev}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${API_PORT:-4000}:4000"
    volumes:
      - ./apps/api/src:/app/src
      - ./apps/api/prisma:/app/prisma
      - ./apps/api/tsconfig.json:/app/tsconfig.json
      - ./apps/api/nest-cli.json:/app/nest-cli.json
      - ./apps/api/docker-entrypoint.sh:/usr/local/bin/docker-entrypoint.sh
      - api_reports:/app/reports
    networks:
      - iasa-network

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: development
    container_name: iasa-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api/v1}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-IASA}
      NEXT_PUBLIC_APP_VERSION: ${NEXT_PUBLIC_APP_VERSION:-0.1.0}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ./apps/web/src:/app/src
      - ./apps/web/public:/app/public
    networks:
      - iasa-network

  # Optional: Metrics & Observability
  prometheus:
    image: prom/prometheus:latest
    container_name: iasa-prometheus
    restart: unless-stopped
    profiles: ["observability"]
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - iasa-network

  grafana:
    image: grafana/grafana:latest
    container_name: iasa-grafana
    restart: unless-stopped
    profiles: ["observability"]
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3001:3000"
    networks:
      - iasa-network

volumes:
  postgres_data:
  redis_data:
  api_reports:
  prometheus_data:
  grafana_data:

networks:
  iasa-network:
    driver: bridge
