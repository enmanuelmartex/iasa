name: IASA CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  BUN_VERSION: "1.1.38"

jobs:
  # =============================================================================
  # Lint & Type Check
  # =============================================================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install

      - name: Lint API
        run: bun run lint:api

      - name: Lint Web
        run: bun run lint:web

      - name: Type check API
        run: bun run --cwd apps/api exec tsc --noEmit

      - name: Type check Web
        run: bun run --cwd apps/web type-check

  # =============================================================================
  # Test API
  # =============================================================================
  test-api:
    name: Test API
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: iasa_test
          POSTGRES_PASSWORD: iasa_test_pass
          POSTGRES_DB: iasa_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install

      - name: Generate Prisma client
        run: bun run --cwd apps/api db:generate
        env:
          DATABASE_URL: postgresql://iasa_test:iasa_test_pass@localhost:5432/iasa_test

      - name: Run API tests
        run: bun run test:api
        env:
          DATABASE_URL: postgresql://iasa_test:iasa_test_pass@localhost:5432/iasa_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-key-minimum-32-chars-long
          ENCRYPTION_KEY: test-encryption-key-32-chars-long

  # =============================================================================
  # Security Scan (IASA scans itself)
  # =============================================================================
  security-scan:
    name: Security Assessment
    runs-on: ubuntu-latest
    needs: [test-api]
    if: github.ref == 'refs/heads/main'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: iasa
          POSTGRES_PASSWORD: iasa_ci_pass
          POSTGRES_DB: iasa
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install & Build
        run: |
          bun install
          bun run build:api
        env:
          DATABASE_URL: postgresql://iasa:iasa_ci_pass@localhost:5432/iasa
          REDIS_URL: redis://localhost:6379

      - name: Run migrations
        run: bun run db:migrate:prod
        env:
          DATABASE_URL: postgresql://iasa:iasa_ci_pass@localhost:5432/iasa

      - name: Start API
        run: bun run start:api &
        env:
          DATABASE_URL: postgresql://iasa:iasa_ci_pass@localhost:5432/iasa
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-key-minimum-32-chars
          ENCRYPTION_KEY: ci-encryption-key-32-chars-long-x
          PORT: 4000

      - name: Wait for API
        run: |
          timeout 30 bash -c 'until curl -sf http://localhost:4000/api/v1/health; do sleep 2; done'

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: iasa-security-report.sarif
          category: api-security
        continue-on-error: true

  # =============================================================================
  # Build Docker Images
  # =============================================================================
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, test-api]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/api
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web
        uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          file: ./apps/web/Dockerfile
          target: production
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/web:latest
            ghcr.io/${{ github.repository }}/web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
